[toolchain]

[features]
resolution = true
skip-lint = false

[programs.devnet]
lowkie_pool = "8BQ1SwL7udKofSCAGgYXcRX7uMCvt33k6nbSEbXBkYNF"

[programs.localnet]
lowkie_pool = "8BQ1SwL7udKofSCAGgYXcRX7uMCvt33k6nbSEbXBkYNF"

[registry]
url = "https://api.apr.dev"

[provider]
cluster = "localnet"
wallet = "~/.config/solana/id.json"

[scripts]
test = "yarn run ts-mocha -p ./tsconfig.json -t 1000000 tests/**/*.ts"

[test]
startup_wait = 120000
shutdown_wait = 2000
upgradeable = false

[test.validator]
bind_address = "0.0.0.0"
faucet_port = 9902
ledger = ".anchor/test-ledger"
rpc_port = 8899
